# spark-self-heal :: local Airflow stack
#
# Pattern: "control plane local, data plane in the cloud".
# Airflow runs on your machine and triggers Glue Jobs on real AWS.
#
# Usage:
#   docker compose up -d                  # start everything
#   docker compose logs -f airflow-webserver
#   docker compose down                   # stop (keeps volumes)
#   docker compose down -v                # stop and wipe metadata (full reset)
#
# Default UI: http://localhost:8080  (user: admin / password: admin)

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3-python3.12
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # AWS credentials passed through from the host
    AWS_PROFILE: spark-self-heal
    AWS_DEFAULT_REGION: us-east-1
    # Install AWS provider on container init
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon==9.0.0
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    # Pass through ~/.aws so the AWS provider can use the CLI profile
    - ${HOME}/.aws:/home/airflow/.aws:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssh_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: ssh_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Cristian \
          --lastname Caro \
          --role Admin \
          --email cristian@example.com
        echo "Airflow initialized."
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: ssh_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: ssh_airflow_scheduler
    command: scheduler
    # Official scheduler healthcheck (Airflow 2.x docker-compose reference).
    # The :8974/health endpoint requires opting in via
    # AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK_SERVER and isn't enabled by
    # default; `airflow jobs check` queries the metadata DB directly.
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
